[judge]
judge = "anthropic/claude-sonnet-4-6"
files = ["/logs/artifacts/report.md"]

[[criterion]]
description = "Rate whether the final report is complete for a Discord World Cup scoreline report. It should include scope/date for the requested future U.S. Pacific-time slate, the slate's fixtures, exact home:away scorelines, confidence levels, basis notes, risk notes, best scoreline leans, actionable lineup status or late-news context, and sources. Reward reports that incorporate confirmed lineups when they are available, and use pending-lineup caveats only when lineups are not found or a concrete unresolved starter/formation question materially affects the pick. Penalize generic 'wait for lineups' advice when confirmed lineups are available or when the report gives no specific material lineup uncertainty. For knockout-stage reports, also reward regulation/90-minute score, AET or PK outcome, PK likelihood with a brief reason, and a separate aggregate including PKs when applicable; the report should keep the official match score visibly separate from any PK-inclusive aggregate. Penalize incomplete slate coverage, stale date framing, missing risk/basis/confidence, missing knockout-stage PK/aggregate context when relevant, or missing source context. Deterministic date and fixture correctness are checked separately, so focus on report completeness and usability."
type = "likert"
points = 5
