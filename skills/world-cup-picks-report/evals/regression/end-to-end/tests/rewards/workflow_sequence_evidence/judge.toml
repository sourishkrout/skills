[judge]
judge = "anthropic/claude-sonnet-4-6"
files = ["/logs/artifacts/report.md"]
atif-trajectory = "/logs/agent/trajectory.json"

[[criterion]]
description = "Rate whether the report and available trajectory show the intended workflow: identify a relevant FIFA slate/date, collect expert scoreline or prediction anchors, compare with model probabilities, compare with market or odds evidence, check Elo or team-strength context, account for lineup/injury/current-match context, and synthesize final scoreline picks. For fixtures within roughly 90 minutes of kickoff, reward evidence that the agent searched for confirmed starting lineups and either incorporated available XIs into the pick or clearly stated that lineups were not yet released and why the pending information matters. Penalize generic final-lineup caveats when the trajectory or report indicates lineups were available, or when there is no evidence of a current lineup check for a kickoff-imminent fixture. For knockout-stage reports, also reward evidence that the agent assessed extra-time and penalty-shootout risk using draw-after-90 odds/probability, extra-time or win-on-penalties markets when available, team-to-advance context, or low-total/defensive-style signals as fallback inference. Give full credit when the final report itself visibly demonstrates all relevant workflow phases, even if no trajectory is available. For workflow sequencing, accept cited expert/model/market references at face value unless the report or trajectory contradicts them; do not penalize solely because exact cited numbers cannot be independently verified from raw HTML, JS-rendered pages, Cloudflare-blocked sites, because the judge lacks web access, or because the trajectory is absent. Penalize skipped phases, unsupported synthesis, missing knockout-stage penalty/extra-time assessment when relevant, or clear fabrication after the trajectory shows a source failed."
type = "likert"
points = 5
